version: 2
updates:
  - package-ecosystem: npm
    directory: "/web"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/New_York
    open-pull-requests-limit: 10
    labels: ["type/chore", "area/hygiene"]
    groups:
      minor-and-patch:
        dependency-type: "development"
        update-types: ["minor", "patch"]
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    labels: ["type/chore", "area/hygiene"]
