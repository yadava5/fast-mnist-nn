name: commitlint

on:
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  lint-commits:
    name: Lint commit messages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Lint commits with commitlint
        uses: wagoid/commitlint-github-action@v6
        with:
          configFile: web/commitlint.config.mjs
